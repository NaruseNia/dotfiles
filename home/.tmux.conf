# Settings
set -g mouse on
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set-option -g prefix C-g

# Binding
unbind-key C-b
bind-key C-g send-prefix

bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M
bind-key -n M-S-Right resize-pane -R 3
bind-key -n M-S-Up resize-pane -U 3
bind-key -n M-S-Down resize-pane -D 3
bind-key -n M-S-Left resize-pane -L 3
bind-key -n M-C-Left run-shell 'cur="#{pane_id}"; tmux select-pane -L; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :-; true'
bind-key -n M-C-Right run-shell 'cur="#{pane_id}"; tmux select-pane -R; [ "$cur" = "$(tmux display -p "##{pane_id}")" ] && tmux select-window -t :+; true'
bind-key -n M-C-Up select-pane -U
bind-key -n M-C-Down select-pane -D
bind-key -n M-C-c run-shell '~/.config/tmux/scripts/toggle-claude-pane.sh "#{pane_id}"'
bind-key y display-popup -E -w 90% -h 90% -d "#{pane_current_path}" \
  "tmux new-session '~/.config/tmux/scripts/yazi-popup.sh #{pane_id}' \\; set status off \\; set detach-on-destroy on"

# Hook
set-hook -g after-split-window "select-layout -E"
set-hook -g pane-exited "select-layout -E"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Style
set -g @tmux-dotbar-right true

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
